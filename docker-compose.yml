services:
  app:
    container_name: ${PROYECTO:?PROYECTO requerido}-app
    build:
      context: .
      args:
        VITE_API_URL: /api
    environment:
      APP_PORT: ${APP_PORT:-5000}
      ORACLE_USER: ${ORACLE_USER:-transmetro}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-transmetro2026}
      ORACLE_CONNECT_STRING: ${ORACLE_CONNECT_STRING:-oracle-db:1521/XEPDB1}
      ORACLE_POOL_MIN: ${ORACLE_POOL_MIN:-2}
      ORACLE_POOL_MAX: ${ORACLE_POOL_MAX:-10}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://${PROYECTO:?PROYECTO requerido}.2kdesarrollo.com}
      TRUST_PROXY: ${TRUST_PROXY:-1}
    expose:
      - "${APP_PORT:-5000}"
    networks:
      - proyecto-net
      - shared-net
      - oracle-net
    restart: unless-stopped

networks:
  proyecto-net:
    name: ${PROYECTO:?PROYECTO requerido}-net
    driver: bridge
  shared-net:
    external: true
  oracle-net:
    external: true
